<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" fill="none">
  <g transform="scale(1.25)">

    <!-- M cursif -->
    <path
      d="M 8 60
         C 6 44   10 10  20 12
         C 28 14  27 48  32 50
         C 36 52  35 14  45 12
         C 55 10  55 42  52 60"
      stroke="#1E1510"
      stroke-width="3.6"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- T cursif -->
    <path
      d="M 52 60
         C 56 60  62 58  64 60
         C 65 61  63 12  63 12"
      stroke="#1E1510"
      stroke-width="3.6"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Barre du T -->
    <path
      d="M 50 26  C 56 23  70 23  76 26"
      stroke="#1E1510"
      stroke-width="3.4"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Point orange -->
    <circle cx="83" cy="36" r="4.5" fill="#C0562A"/>

  </g>

  <!-- Séparateur -->
  <rect x="130" y="18" width="1.2" height="60" fill="rgba(0,0,0,0.15)"/>

  <!-- VENTE label -->
  <text
    x="146" y="42"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="700"
    fill="#C0562A"
    letter-spacing="6"
  >VENTE</text>

  <!-- FREELANCE wordmark -->
  <text
    x="146" y="70"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="23" font-weight="900"
    fill="#2C1F0E"
    letter-spacing="2"
  >FREELANCE</text>

</svg>
